services:
  rwm:
    build:
      context: .
      dockerfile: Dockerfile
    image: rwm:latest
    ports:
      - "8101:3000"
    volumes:
      - rwm-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/retro.db
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  rwm-data:
    driver: local
    name: rwm-data
