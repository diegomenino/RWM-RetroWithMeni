services:
  retro-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8011:3000"
    volumes:
      - retro-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/retro.db
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      # NextAuth — required
      - NEXTAUTH_URL=http://localhost:8011
      - NEXTAUTH_SECRET=change-me-use-openssl-rand-base64-32
      # Google SSO (optional — remove if not using)
      - GOOGLE_CLIENT_ID=
      - GOOGLE_CLIENT_SECRET=
      # Microsoft Azure AD SSO (optional — remove if not using)
      - AZURE_AD_CLIENT_ID=
      - AZURE_AD_CLIENT_SECRET=
      - AZURE_AD_TENANT_ID=
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  retro-data:
    driver: local
